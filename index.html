<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Route Manifest — Agency Visit Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --ink:#0F1F4D;
    --ink-soft:#3B4C86;
    --paper:#F2F4FA;
    --paper-raised:#FFFFFF;
    --line:#DCE1EF;
    --line-strong:#B7C0DE;
    --route:#7A4FE0;
    --route-soft:#EDE6FB;
    --route-dark:#5A34B8;
    --visited:#C98A1B;
    --visited-soft:#F6E7C9;
    --pending:#B23B3B;
    --pending-soft:#F5DEDC;
    --virtual:#3D6FB4;
    --virtual-soft:#DCE6F4;
    --phone:#1E8A82;
    --phone-soft:#DCEFEC;
    --muted:#5C6690;
    --navy:#0F1F4D;
    --lightblue:#9FD8F0;
    --cream:#F0EAD8;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Public Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:'Space Grotesk',sans-serif;margin:0;color:var(--ink);}
  .mono{font-family:'IBM Plex Mono',monospace;}
  #app{max-width:1080px;margin:0 auto;padding:0 20px 60px;}

  .topbar{
    display:flex;justify-content:space-between;align-items:flex-end;
    padding:26px 24px 20px;margin:0 -20px 0;background:var(--navy);
    border-radius:0 0 22px 22px;color:#fff;
  }
  .brand-mark{display:flex;flex-direction:column;gap:2px;}
  .brand-mark .wordmark{
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:34px;
    letter-spacing:-0.01em;color:#fff;line-height:1;
    border-bottom:4px solid var(--route);display:inline-block;padding-bottom:4px;width:fit-content;
  }
  .brand-mark .tagline{
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:#fff;margin-top:8px;
  }
  .topbar .sub{font-size:12px;color:#C7CEEE;margin-top:4px;font-family:'IBM Plex Mono',monospace;}
  .year-pill{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#C7CEEE;text-align:right;}
  .brand-strip{
    height:10px;margin:0 -20px 4px;border-radius:0 0 4px 4px;overflow:hidden;
    display:flex;
  }
  .brand-strip span{flex:1;height:100%;}

  .tabs{display:flex;gap:6px;margin:18px 0 22px;flex-wrap:wrap;}
  .tab-btn{
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13.5px;
    padding:9px 16px;border-radius:999px 999px 0 0;border:2px solid var(--ink);
    border-bottom:none;background:var(--paper-raised);color:var(--ink-soft);
    cursor:pointer;position:relative;top:2px;
  }
  .tab-btn.active{background:var(--ink);color:#fff;}
  .tab-btn .count{
    font-family:'IBM Plex Mono',monospace;font-weight:400;font-size:11px;
    margin-left:6px;opacity:0.7;
  }

  .card{
    background:var(--paper-raised);border:1.5px solid var(--line-strong);
    border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;
  }
  .card-flat{
    background:var(--paper-raised);border:1px solid var(--line);
    border-radius:var(--radius);
  }
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .row-between{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}

  input[type=text],input[type=tel],input[type=date],select,textarea{
    font-family:'Public Sans',sans-serif;font-size:13.5px;padding:8px 10px;
    border:1.5px solid var(--line-strong);border-radius:7px;background:#fff;color:var(--ink);
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--route);outline-offset:1px;}
  label{font-size:11.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.03em;display:block;margin-bottom:4px;}
  .field{display:flex;flex-direction:column;gap:2px;}

  button{
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;
    padding:8px 14px;border-radius:7px;border:1.5px solid var(--ink);
    background:#fff;color:var(--ink);cursor:pointer;
  }
  button:hover{background:var(--paper);}
  button.primary{background:var(--route);color:#fff;border-color:var(--route-dark);}
  button.primary:hover{background:var(--route-dark);}
  button.ghost{border-color:transparent;background:transparent;padding:6px 8px;}
  button.ghost:hover{background:var(--paper);}
  button.danger{border-color:var(--pending);color:var(--pending);background:#fff;}
  button.danger:hover{background:var(--pending-soft);}
  button:disabled{opacity:.45;cursor:not-allowed;}
  button.sm{padding:5px 10px;font-size:12px;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{
    text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;
    text-transform:uppercase;letter-spacing:.04em;color:var(--muted);
    padding:6px 8px;border-bottom:1.5px solid var(--ink);
  }
  td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top;}
  tr:hover td{background:var(--paper);}
  .addr{color:var(--ink-soft);font-size:12.5px;}
  .agency-name{font-weight:600;}

  .stamp{
    display:inline-flex;align-items:center;gap:5px;padding:3px 9px;
    border-radius:999px;font-family:'IBM Plex Mono',monospace;font-size:11px;
    font-weight:600;border:1.3px solid transparent;white-space:nowrap;
  }
  .stamp.visited-in-person{background:var(--visited-soft);color:#7A5510;border-color:var(--visited);}
  .stamp.visited-virtual{background:var(--virtual-soft);color:#28477A;border-color:var(--virtual);}
  .stamp.visited-phone{background:var(--phone-soft);color:#4C3778;border-color:var(--phone);}
  .stamp.pending{background:var(--pending-soft);color:#7A2626;border-color:var(--pending);}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
  .dot.visited-in-person{background:var(--visited);}
  .dot.visited-virtual{background:var(--virtual);}
  .dot.visited-phone{background:var(--phone);}
  .dot.pending{background:var(--pending);}

  .empty{
    border:1.5px dashed var(--line-strong);border-radius:var(--radius);
    padding:32px 20px;text-align:center;color:var(--muted);
  }
  .empty .empty-title{font-family:'Space Grotesk',sans-serif;color:var(--ink);font-weight:600;font-size:15px;margin-bottom:4px;}

  .modal-backdrop{
    position:fixed;inset:0;background:rgba(23,36,46,.45);
    display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .modal{
    background:#fff;border-radius:12px;border:1.5px solid var(--ink);
    padding:22px 24px;max-width:460px;width:100%;max-height:88vh;overflow:auto;
  }
  .modal h3{font-size:16px;margin-bottom:14px;}
  .modal .field{margin-bottom:12px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}

  .route-card{
    border:1.5px solid var(--line-strong);border-radius:var(--radius);
    background:var(--paper-raised);padding:16px 18px;margin-bottom:14px;
    border-left:5px solid var(--route);
  }
  .route-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;}
  .route-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15.5px;}
  .day-chip{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;
    background:var(--route-soft);color:var(--route-dark);padding:3px 9px;border-radius:999px;
    letter-spacing:.03em;font-weight:600;
  }
  .stop-list{list-style:none;margin:12px 0 0;padding:0;}
  .stop-item{
    display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line);
  }
  .stop-num{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);
    width:20px;flex-shrink:0;
  }
  .stop-body{flex:1;min-width:0;}
  .stop-name{font-weight:600;font-size:13.5px;overflow-wrap:anywhere;}
  .stop-addr{font-size:12px;color:var(--muted);overflow-wrap:anywhere;}
  .drag-handle{cursor:grab;color:var(--muted);padding:0 4px;}
  .stop-item.dragging{opacity:.4;}
  .time-chip{
    font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;
    background:var(--route-soft);color:var(--route-dark);padding:3px 8px;border-radius:6px;white-space:nowrap;
  }
  .drive-seg{
    list-style:none;padding:4px 0 4px 30px;font-size:12px;color:var(--muted);
    border-top:none;display:flex;align-items:center;gap:4px;flex-wrap:wrap;
  }

  .metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
  .metric{background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;}
  .metric .label{font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;color:var(--muted);letter-spacing:.03em;}
  .metric .value{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;margin-top:4px;}
  .progress-track{height:10px;border-radius:999px;background:var(--pending-soft);overflow:hidden;display:flex;margin-top:8px;}
  .progress-seg{height:100%;}

  .month-bars{display:flex;align-items:flex-end;gap:6px;height:90px;margin-top:10px;}
  .month-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:4px;}
  .month-bar{width:100%;background:var(--route);border-radius:3px 3px 0 0;min-height:2px;}
  .month-label{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--muted);}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:8px;
    font-size:13px;font-family:'Public Sans',sans-serif;z-index:100;
    box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  .search-input{min-width:220px;flex:1;}
  .import-zone{
    border:1.5px dashed var(--line-strong);border-radius:var(--radius);
    padding:16px;text-align:center;color:var(--muted);font-size:12.5px;
  }
  .checkbox-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid var(--line);}
  .checkbox-row input{width:15px;height:15px;}
  .agency-picker{max-height:260px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:0 10px;}
  .section-label{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:.04em;margin:18px 0 8px;}
  .link-btn{background:none;border:none;color:var(--route);font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;padding:0;text-decoration:underline;}
  .banner{
    background:var(--route-soft);border:1px solid var(--route);border-radius:8px;
    padding:10px 14px;font-size:12.5px;color:var(--route-dark);margin-bottom:16px;
  }
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}

  .rep-gate{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .rep-gate-inner{background:var(--paper-raised);border:1.5px solid var(--line-strong);border-radius:16px;padding:32px 28px;max-width:380px;width:100%;}
  .rep-gate-inner .wordmark{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:28px;border-bottom:4px solid var(--route);display:inline-block;padding-bottom:2px;}
  .rep-gate-inner .tagline{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;}
  .rep-list{display:flex;flex-direction:column;gap:8px;}
  .rep-card{
    text-align:left;padding:12px 14px;border-radius:8px;border:1.5px solid var(--line-strong);
    background:#fff;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;
  }
  .rep-card:hover{background:var(--route-soft);border-color:var(--route);}
  .owner-chip{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;background:var(--paper);
    color:var(--muted);padding:2px 7px;border-radius:999px;border:1px solid var(--line-strong);white-space:nowrap;
  }
  .scope-toggle{display:flex;border:1.5px solid var(--ink);border-radius:8px;overflow:hidden;}
  .scope-toggle button{border:none;border-radius:0;padding:7px 14px;}
  .scope-toggle button.active{background:var(--ink);color:#fff;}

  .stale-banner{
    background:var(--pending-soft);border:1.5px solid var(--pending);border-radius:8px;
    padding:10px 14px;margin-bottom:16px;font-size:13px;color:#7A2626;
  }
  .stale-list{list-style:none;margin:10px 0 0;padding:8px 0 0;border-top:1px solid rgba(178,59,59,.3);max-height:220px;overflow:auto;}
  .stale-list li{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:5px 0;font-size:12.5px;}
  .stale-list li .addr{color:#8a4444;}

  @media (max-width:640px){
    #app{padding:0 12px 40px;}
    .topbar{flex-direction:column;align-items:flex-start;gap:10px;padding:20px 16px 16px;margin:0 -12px 0;}
    .brand-strip{margin:0 -12px 4px;}
    .brand-mark .wordmark{font-size:26px;}
    .brand-mark .tagline{font-size:16px;}
    .year-pill{text-align:left;}
    .tabs{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
    .tab-btn{flex-shrink:0;}
    .card,.route-card{padding:14px;}
    table{font-size:12px;}
    th,td{padding:7px 5px;}
    .modal{padding:18px;max-width:94vw;}
    .metric-grid{grid-template-columns:repeat(2,1fr);}
    button{min-height:38px;}
    .row-between{align-items:stretch;}
    .search-input{min-width:0;width:100%;}
    .stop-item{flex-wrap:wrap;}
    .stop-item .stop-body{flex:1 1 100%;order:1;}
    .stop-item .drag-handle,.stop-item .stop-num{order:0;}
    .stop-item select,.stop-item button{order:2;}
    .drive-seg{padding-left:4px;}
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
// ---------- state ----------
const state = {
  tab: 'agencies',
  agencies: [],
  routes: [],
  visits: [],
  reps: [],
  currentRepId: null,
  agencyViewScope: 'mine', // 'mine' | 'all'
  repGateStep: 'pick', // 'pick' | 'pin' | 'new'
  repGateSelectedId: null,
  settings: { staleDays: 30 },
  editingRouteId: null,
  agencySearch: '',
  dashboardYear: new Date().getFullYear(),
  loaded: false,
  syncStatus: 'unconfigured', // unconfigured | connected | error | syncing
  lastSyncedAt: null,
  staleBannerOpen: false,
  driveTimeCache: {} // routeId -> { computing: bool, segments: [{minutes, miles}], error: bool }
};

function repById(id){ return state.reps.find(r => r.id === id); }
function currentRep(){ return repById(state.currentRepId); }
function myAgencies(){ return state.agencies.filter(a => a.ownerId === state.currentRepId); }
function getRememberedRepId(){
  try{ return localStorage.getItem('avp_current_rep') || null; }catch(e){ return null; }
}
function rememberRepId(id){
  try{ if(id) localStorage.setItem('avp_current_rep', id); else localStorage.removeItem('avp_current_rep'); }catch(e){}
}

const WEEKDAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const VISIT_TYPES = [
  {id:'in-person', label:'In person', color:'visited-in-person'},
  {id:'virtual', label:'Virtual', color:'visited-virtual'},
  {id:'phone', label:'Phone call', color:'visited-phone'}
];
const TIME_OPTIONS = (function(){
  const out = [];
  for(let h=0; h<24; h++){
    for(let m=0; m<60; m+=15){
      const hh = String(h).padStart(2,'0');
      const mm = String(m).padStart(2,'0');
      const ampm = h===0 ? '12:'+mm+' AM' : h<12 ? h+':'+mm+' AM' : h===12 ? '12:'+mm+' PM' : (h-12)+':'+mm+' PM';
      out.push({ value: hh+':'+mm, label: ampm });
    }
  }
  return out;
})();

function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }

// ---------- storage ----------
// Data is cached in this browser's localStorage (works instantly, per-device)
// and mirrored to a Google Sheet via a small Apps Script endpoint (works across devices).
// See Settings tab to connect the endpoint.
function getEndpoint(){
  try{ return localStorage.getItem('avp_endpoint') || ''; }catch(e){ return ''; }
}
function setEndpoint(url){
  try{ localStorage.setItem('avp_endpoint', url); }catch(e){}
}
function localGet(key){
  try{ const v = localStorage.getItem('avp_'+key); return v ? JSON.parse(v) : null; }catch(e){ return null; }
}
function localSet(key, value){
  try{ localStorage.setItem('avp_'+key, JSON.stringify(value)); }catch(e){}
}

async function remoteGet(key){
  const endpoint = getEndpoint();
  if(!endpoint) return null;
  const res = await fetch(endpoint + '?key=' + encodeURIComponent(key), { method:'GET' });
  if(!res.ok) throw new Error('Bad response');
  const data = await res.json();
  return data.value != null ? JSON.parse(data.value) : null;
}
async function remoteSet(key, value){
  const endpoint = getEndpoint();
  if(!endpoint) return false;
  const res = await fetch(endpoint, {
    method:'POST',
    headers:{ 'Content-Type':'text/plain;charset=utf-8' }, // text/plain avoids a CORS preflight Apps Script can't answer
    body: JSON.stringify({ key, value: JSON.stringify(value) })
  });
  if(!res.ok) throw new Error('Bad response');
  return true;
}

async function loadState(){
  const endpoint = getEndpoint();
  const keys = ['agencies','routes','visits','settings','reps'];
  if(endpoint){
    state.syncStatus = 'syncing';
    try{
      const [a, r, v, st, rp] = await Promise.all(keys.map(remoteGet));
      state.agencies = a || [];
      state.routes = r || [];
      state.visits = v || [];
      state.settings = st || { staleDays: 30 };
      state.reps = rp || [];
      keys.forEach(k => localSet(k, state[k]));
      state.syncStatus = 'connected';
      state.lastSyncedAt = new Date();
    }catch(e){
      state.agencies = localGet('agencies') || [];
      state.routes = localGet('routes') || [];
      state.visits = localGet('visits') || [];
      state.settings = localGet('settings') || { staleDays: 30 };
      state.reps = localGet('reps') || [];
      state.syncStatus = 'error';
    }
  } else {
    state.agencies = localGet('agencies') || [];
    state.routes = localGet('routes') || [];
    state.visits = localGet('visits') || [];
    state.settings = localGet('settings') || { staleDays: 30 };
    state.reps = localGet('reps') || [];
    state.syncStatus = 'unconfigured';
  }
  migrateRouteStops();
  const remembered = getRememberedRepId();
  if(remembered && repById(remembered)) state.currentRepId = remembered;
  state.loaded = true;
  render();
}

// Older saved routes stored `agencyIds: [id, id, ...]`. Newer routes store
// `stops: [{agencyId, time}, ...]` so each stop can carry a scheduled time.
function migrateRouteStops(){
  let changed = false;
  state.routes.forEach(r => {
    if(!r.stops && Array.isArray(r.agencyIds)){
      r.stops = r.agencyIds.map(id => ({ agencyId:id, time:'' }));
      delete r.agencyIds;
      changed = true;
    }
    if(!r.stops) r.stops = [];
  });
  if(changed) saveRoutes();
}

async function persist(key, value){
  localSet(key, value); // always save locally first so nothing is ever lost
  const endpoint = getEndpoint();
  if(!endpoint){ render(); return; }
  try{
    await remoteSet(key, value);
    state.syncStatus = 'connected';
    state.lastSyncedAt = new Date();
  }catch(e){
    state.syncStatus = 'error';
    showToast('Saved on this device — could not reach shared storage');
  }
  render();
}
const saveAgencies = () => persist('agencies', state.agencies);
const saveRoutes = () => persist('routes', state.routes);
const saveVisits = () => persist('visits', state.visits);
const saveReps = () => persist('reps', state.reps);
const saveSettings = () => persist('settings', state.settings);

async function syncNow(){
  if(!getEndpoint()){ showToast('Add your Apps Script URL first'); return; }
  state.syncStatus = 'syncing'; render();
  try{
    await Promise.all([
      remoteSet('agencies', state.agencies),
      remoteSet('routes', state.routes),
      remoteSet('visits', state.visits),
      remoteSet('settings', state.settings)
    ]);
    state.syncStatus = 'connected';
    state.lastSyncedAt = new Date();
    showToast('Synced');
  }catch(e){
    state.syncStatus = 'error';
    showToast('Could not reach shared storage — check the URL and your connection');
  }
  render();
}

function showToast(msg){
  const root = document.getElementById('toast-root');
  root.innerHTML = '<div class="toast">'+escapeHtml(msg)+'</div>';
  setTimeout(()=>{ root.innerHTML=''; }, 2600);
}


function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- derived helpers ----------
function agencyById(id){ return state.agencies.find(a => a.id === id); }

function visitsForAgencyYear(agencyId, year){
  return state.visits.filter(v => v.agencyId === agencyId && new Date(v.date).getFullYear() === year);
}
function lastVisit(agencyId){
  const vs = state.visits.filter(v => v.agencyId === agencyId).sort((a,b)=> new Date(b.date)-new Date(a.date));
  return vs[0] || null;
}
function yearStats(year){
  const mine = myAgencies();
  const total = mine.length;
  const myIds = new Set(mine.map(a=>a.id));
  const visitedIds = new Set(state.visits.filter(v => myIds.has(v.agencyId) && new Date(v.date).getFullYear() === year).map(v=>v.agencyId));
  const visitedCount = visitedIds.size;
  const pct = total ? Math.round((visitedCount/total)*1000)/10 : 0;
  const byType = {'in-person':0,'virtual':0,'phone':0};
  state.visits.filter(v => myIds.has(v.agencyId) && new Date(v.date).getFullYear() === year).forEach(v => { byType[v.type] = (byType[v.type]||0)+1; });
  return { total, visitedCount, pct, byType, visitedIds };
}

function staleAgencies(){
  const days = state.settings.staleDays || 30;
  const cutoff = Date.now() - days*24*60*60*1000;
  return myAgencies().filter(a => {
    const lv = lastVisit(a.id);
    return !lv || new Date(lv.date).getTime() < cutoff;
  }).sort((a,b) => {
    const la = lastVisit(a.id), lb = lastVisit(b.id);
    const ta = la ? new Date(la.date).getTime() : -Infinity;
    const tb = lb ? new Date(lb.date).getTime() : -Infinity;
    return ta - tb;
  });
}

// ---------- CSV import ----------
function normalizeHeader(h){ return h.toLowerCase().replace(/[^a-z]/g,''); }
function mapRow(row){
  const out = {name:'', address:'', principal:'', phone:''};
  Object.keys(row).forEach(key => {
    const nk = normalizeHeader(key);
    const val = (row[key]||'').toString().trim();
    if(!val) return;
    if(['name','agency','agencyname','organization','org'].includes(nk)) out.name = val;
    else if(['address','addr','location','street','fulladdress'].includes(nk)) out.address = val;
    else if(['principal','principalname','director','contact','contactname'].includes(nk)) out.principal = val;
    else if(['phone','phonenumber','telephone','tel','number'].includes(nk)) out.phone = val;
  });
  return out;
}
function handleCsvFile(file){
  Papa.parse(file, {
    header:true, skipEmptyLines:true,
    complete: function(results){
      let added = 0, skipped = 0;
      results.data.forEach(row => {
        const m = mapRow(row);
        if(!m.name || !m.address){ skipped++; return; }
        state.agencies.push({ id: uid(), name:m.name, address:m.address, principal:m.principal, phone:m.phone, ownerId: state.currentRepId, createdAt: new Date().toISOString() });
        added++;
      });
      saveAgencies();
      showToast(added + ' agencies imported' + (skipped ? ', ' + skipped + ' rows skipped (missing name/address)' : ''));
      render();
    },
    error: function(){ showToast('Could not read that file — check it is a CSV.'); }
  });
}

// ---------- geocoding + drive time estimates ----------
// Uses free public services (OpenStreetMap Nominatim for geocoding, OSRM's demo
// router for driving time). No API key needed, but these are best-effort/rate-limited
// public services meant for light personal use — not a paid, guaranteed-uptime API.
function sleep(ms){ return new Promise(res => setTimeout(res, ms)); }

async function geocodeAddress(address){
  const attempt = async (q) => {
    const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(q);
    const res = await fetch(url, { headers: { 'Accept':'application/json' } });
    if(res.status === 429){ await sleep(2000); return attempt(q); } // rate-limited, back off once and retry
    if(!res.ok) throw new Error('geocode failed');
    const data = await res.json();
    if(!data || !data[0]) return null;
    return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
  };
  // First try the address as entered.
  let loc = await attempt(address);
  if(loc) return loc;
  // Fall back to a simplified version — suite/unit numbers are the most common
  // reason a full-service geocoder can't find an otherwise-valid address.
  const simplified = address
    .replace(/,?\s*(suite|ste|unit|apt|#)\s*[\w-]+/gi, '')
    .replace(/\s{2,}/g, ' ')
    .trim();
  if(simplified && simplified !== address){
    await sleep(1100);
    loc = await attempt(simplified);
    if(loc) return loc;
  }
  throw new Error('no match');
}

async function ensureGeocoded(agency){
  if(agency.lat != null && agency.lon != null) return true; // includes manually-entered coordinates
  try{
    const loc = await geocodeAddress(agency.address);
    agency.lat = loc.lat;
    agency.lon = loc.lon;
    return true;
  }catch(e){
    return false;
  }
}

async function driveSegment(from, to){
  const attempt = async () => {
    const url = 'https://router.project-osrm.org/route/v1/driving/'+from.lon+','+from.lat+';'+to.lon+','+to.lat+'?overview=false';
    const res = await fetch(url);
    if(!res.ok) throw new Error('routing failed');
    const data = await res.json();
    if(!data.routes || !data.routes[0]) throw new Error('no route');
    return { minutes: Math.round(data.routes[0].duration/60), miles: Math.round(data.routes[0].distance/160.9344)/10 };
  };
  try{
    return await attempt();
  }catch(e){
    await sleep(1200); // the free OSRM demo server occasionally hiccups — one retry clears most of these
    return await attempt();
  }
}

// If a Google Maps API key is set in Settings, drive times are estimated with
// Google's Distance Matrix Service instead — it takes addresses directly (no
// separate geocoding step to fail) and reflects Google's own road data.
let googleMapsLoading = null;
function loadGoogleMaps(apiKey){
  if(window.google && window.google.maps) return Promise.resolve();
  if(googleMapsLoading) return googleMapsLoading;
  googleMapsLoading = new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(apiKey) + '&libraries=places';
    script.onload = () => resolve();
    script.onerror = () => reject(new Error('Google Maps failed to load — check the API key'));
    document.head.appendChild(script);
  });
  return googleMapsLoading;
}
async function estimateDriveTimesGoogle(routeId, apiKey){
  const r = state.routes.find(x=>x.id===routeId);
  const agencies = r.stops.map(s => agencyById(s.agencyId)).filter(Boolean);
  await loadGoogleMaps(apiKey);
  const service = new google.maps.DistanceMatrixService();
  const segments = [];
  let anyError = false;
  for(let i=0; i<agencies.length-1; i++){
    const from = agencies[i].address, to = agencies[i+1].address;
    try{
      const result = await new Promise((resolve, reject) => {
        service.getDistanceMatrix({
          origins:[from], destinations:[to],
          travelMode: google.maps.TravelMode.DRIVING,
          drivingOptions:{ departureTime: new Date(), trafficModel:'bestguess' }
        }, (res, status) => status === 'OK' ? resolve(res) : reject(new Error(status)));
      });
      const el = result.rows[0].elements[0];
      if(el.status !== 'OK') throw new Error(el.status);
      segments.push({ minutes: Math.round(el.duration.value/60), miles: Math.round(el.distance.value/160.9344)/10 });
    }catch(e){
      segments.push(null);
      anyError = true;
    }
  }
  state.driveTimeCache[routeId] = { computing:false, segments, error:anyError, source:'google' };
  render();
}

async function estimateDriveTimes(routeId){
  const r = state.routes.find(x=>x.id===routeId);
  if(!r || r.stops.length < 2) return;
  state.driveTimeCache[routeId] = { computing:true, segments:[], error:false };
  render();

  const googleKey = state.settings.googleMapsApiKey;
  if(googleKey){
    try{
      await estimateDriveTimesGoogle(routeId, googleKey);
      return;
    }catch(e){
      showToast('Google Maps estimate failed — falling back to free routing');
    }
  }

  const agencies = r.stops.map(s => agencyById(s.agencyId)).filter(Boolean);
  const failedNames = [];
  for(let i=0; i<agencies.length; i++){
    if(agencies[i].lat == null || agencies[i].lon == null){
      const ok = await ensureGeocoded(agencies[i]);
      if(!ok) failedNames.push(agencies[i].name);
      await sleep(1100); // respect Nominatim's ~1 request/second usage policy
    }
  }
  saveAgencies();
  const segments = [];
  let routingFailed = false;
  for(let i=0; i<agencies.length-1; i++){
    const from = agencies[i], to = agencies[i+1];
    if(from.lat==null || to.lat==null){ segments.push(null); continue; }
    try{
      segments.push(await driveSegment(from, to));
    }catch(e){
      segments.push(null);
      routingFailed = true;
    }
    await sleep(400);
  }
  state.driveTimeCache[routeId] = { computing:false, segments, error: failedNames.length>0 || routingFailed, failedNames, source:'free' };
  render();
}

        '<button class="ghost sm" data-action="estimate-drive" data-id="'+r.id+'" '+(dt&&dt.computing?'disabled':'')+'>'+
          (dt&&dt.computing ? 'Estimating…' : 'Estimate drive times') +
        '</button>'+
        (dt && dt.error ? '<span class="addr">'+driveErrorMessage(dt)+'</span>' : '')+
      '</div>';
    }

    const addresses = stopAgencies.map(s=>s.agency.address);
    html += '<div class="row" style="margin-top:10px;">'+
      '<button class="primary" data-action="export-apple" data-id="'+r.id+'">Open route in Apple Maps</button>'+
      '<button data-action="export-google" data-id="'+r.id+'">Open route in Google Maps</button>'+
      '<button class="ghost" data-action="copy-stops" data-id="'+r.id+'">Copy stop list</button>'+
    '</div>';

      html += '<div class="addr" style="margin-top:6px;">Long routes may exceed the URL length a map app allows — if the link fails to open, use "Copy stop list" and paste the stops into your maps app instead.</div>';
    }
  } else {
    html += '<div class="addr" style="margin-top:10px;">No stops assigned yet.</div>';
  }
  html += '</div>';
  return html;
}

function formatTime(hhmm){
  const opt = TIME_OPTIONS.find(t => t.value === hhmm);
  return opt ? opt.label : hhmm;
}

function renderDriveSegment(dt, index){
  if(!dt || dt.computing) return '<span class="addr">&middot;&middot;&middot;</span>';
  const seg = dt.segments && dt.segments[index];
  if(!seg) return '<span class="addr">drive time unavailable</span>';
  return '<span class="addr">&#8594; ~'+seg.minutes+' min drive ('+seg.miles+' mi)</span>';
}

function driveErrorMessage(dt){
  if(!dt || !dt.error) return '';
  if(dt.failedNames && dt.failedNames.length){
    return 'Couldn\u2019t locate: '+dt.failedNames.map(escapeHtml).join(', ')+
      '. Try a more complete address, or add coordinates manually on that agency\u2019s edit form.';
  }
  return 'Some legs couldn\u2019t be estimated — the free routing service may be temporarily unavailable. Try again in a moment, or add a Google Maps API key in Settings for a more reliable estimate.';
}

function leaveByHint(r, index){
  const dt = state.driveTimeCache[r.id];
  if(!dt || !dt.segments) return '';
  const seg = dt.segments[index];
  const nextStop = r.stops[index+1];
  if(!seg || !nextStop || !nextStop.time) return '';
  const [hh,mm] = nextStop.time.split(':').map(Number);
  const arriveBy = new Date(); arriveBy.setHours(hh,mm,0,0);
  const leaveBy = new Date(arriveBy.getTime() - seg.minutes*60000);
  const label = leaveBy.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
  return ' <span class="addr">&middot; leave by '+label+' to arrive on time</span>';
}

// ---- Dashboard tab ----
function renderDashboardTab(){
  const year = state.dashboardYear;
  const s = yearStats(year);
  const years = [];
  const nowY = new Date().getFullYear();
  for(let y = nowY+1; y >= nowY-4; y--) years.push(y);

  let html = '<div class="row-between" style="margin-bottom:16px;">'+
    '<div class="field"><label>Calendar year</label><select id="dash-year">'+years.map(y=>'<option value="'+y+'" '+(y===year?'selected':'')+'>'+y+'</option>').join('')+'</select></div>'+
  '</div>';

  if(s.total === 0){
    html += '<div class="empty"><div class="empty-title">Nothing to measure yet</div>Add agencies to start tracking coverage.</div>';
    return html;
  }

  html += '<div class="metric-grid">'+
    '<div class="metric"><div class="label">Agencies visited</div><div class="value">'+s.pct+'%</div>'+
      '<div class="progress-track">'+
        '<div class="progress-seg" style="width:'+s.pct+'%;background:var(--visited);"></div>'+
      '</div>'+
      '<div class="addr" style="margin-top:6px;">'+s.visitedCount+' of '+s.total+' agencies reached in '+year+'</div>'+
    '</div>'+
    '<div class="metric"><div class="label">In person</div><div class="value">'+s.byType['in-person']+'</div><div class="addr">visits logged</div></div>'+
    '<div class="metric"><div class="label">Virtual</div><div class="value">'+s.byType['virtual']+'</div><div class="addr">visits logged</div></div>'+
    '<div class="metric"><div class="label">Phone</div><div class="value">'+s.byType['phone']+'</div><div class="addr">visits logged</div></div>'+
  '</div>';

  // month breakdown
  const monthCounts = new Array(12).fill(0);
  state.visits.filter(v => new Date(v.date).getFullYear() === year).forEach(v => {
    monthCounts[new Date(v.date).getMonth()]++;
  });
  const maxM = Math.max(1, ...monthCounts);
  html += '<div class="card">'+
    '<div class="section-label" style="margin-top:0;">Visits by month</div>'+
    '<div class="month-bars">'+
      monthCounts.map((c,i) => {
        const h = Math.round((c/maxM)*100);
        return '<div class="month-bar-wrap"><div class="mono" style="font-size:10px;color:var(--muted);">'+(c||'')+'</div>'+
          '<div class="month-bar" style="height:'+Math.max(h,c>0?4:0)+'%;"></div>'+
          '<div class="month-label">'+['J','F','M','A','M','J','J','A','S','O','N','D'][i]+'</div></div>';
      }).join('')+
    '</div>'+
  '</div>';

  // not yet visited
  const notVisited = myAgencies().filter(a => !s.visitedIds.has(a.id)).sort((a,b)=>a.name.localeCompare(b.name));
  html += '<div class="section-label">Not yet visited in '+year+' ('+notVisited.length+')</div>';
  if(notVisited.length === 0){
    html += '<div class="banner">Every agency on file has been reached in '+year+'.</div>';
  } else {
    html += '<div class="table-scroll"><table><thead><tr><th>Agency</th><th>Principal</th><th>Phone</th><th></th></tr></thead><tbody>';
    notVisited.forEach(a => {
      html += '<tr><td><div class="agency-name">'+escapeHtml(a.name)+'</div><div class="addr">'+escapeHtml(a.address)+'</div></td>'+
        '<td>'+escapeHtml(a.principal||'—')+'</td><td class="mono">'+escapeHtml(a.phone||'—')+'</td>'+
        '<td><button class="ghost sm" data-action="mark-visited" data-id="'+a.id+'">Log visit</button></td></tr>';
    });
    html += '</tbody></table></div>';
  }
  return html;
}

// ---------- actions ----------
function attachGlobalListeners(){
  document.body.onclick = onGlobalClick;
  document.body.oninput = onGlobalInput;
  document.body.onchange = onGlobalChange;
  const csvInput = document.getElementById('csv-input');
  if(csvInput) csvInput.onchange = (e) => { if(e.target.files[0]) handleCsvFile(e.target.files[0]); e.target.value=''; };
  setupDragReorder();
}

function onGlobalChange(e){
  const t = e.target;
  if(t.id === 'dash-year'){ state.dashboardYear = parseInt(t.value,10); render(); }
  if(t.dataset && t.dataset.action === 'set-stop-time'){
    const r = state.routes.find(x=>x.id===state.editingRouteId);
    const i = parseInt(t.dataset.index,10);
    if(r && r.stops[i]){ r.stops[i].time = t.value; saveRoutes(); render(); }
    return;
  }
  if(t.id === 'route-agency-search'){
    const q = t.value.toLowerCase();
    document.querySelectorAll('#route-agency-picker .checkbox-row').forEach(row => {
      row.style.display = row.dataset.name.includes(q) ? '' : 'none';
    });
  }
}

function onGlobalInput(e){
  const t = e.target;
  if(t.id === 'agency-search'){ state.agencySearch = t.value; render(); document.getElementById('agency-search').focus(); document.getElementById('agency-search').setSelectionRange(t.value.length,t.value.length); }
  if(t.id === 'route-agency-search'){
    const q = t.value.toLowerCase();
    document.querySelectorAll('#route-agency-picker .checkbox-row').forEach(row => {
      row.style.display = row.dataset.name.includes(q) ? '' : 'none';
    });
  }
}

function onGlobalClick(e){
  const btn = e.target.closest('[data-action]');
  // Only the backdrop itself (not anything inside the modal) closes the modal on click.
  if(!btn){
    if(e.target.classList && e.target.classList.contains('modal-backdrop')){
      document.getElementById('modal-root').innerHTML='';
    }
    return;
  }
  const action = btn.dataset.action;
  const id = btn.dataset.id;

  if(action === 'select-rep'){ state.repGateStep = 'pin'; state.repGateSelectedId = id; render(); }
  else if(action === 'confirm-rep-pin'){
    const rep = repById(id);
    const entered = document.getElementById('rep-pin-input').value.trim();
    if(!rep){ return; }
    if(entered !== rep.pin){
      document.getElementById('rep-pin-error').textContent = 'That PIN doesn\u2019t match — try again.';
      return;
    }
    state.currentRepId = rep.id;
    rememberRepId(rep.id);
    state.repGateStep = 'pick';
    state.repGateSelectedId = null;
    render();
    showToast('Signed in as '+rep.name);
  }
  else if(action === 'rep-gate-new'){ state.repGateStep = 'new'; render(); }
  else if(action === 'rep-gate-back'){ state.repGateStep = 'pick'; state.repGateSelectedId = null; render(); }
  else if(action === 'rep-gate-open'){ state.currentRepId = null; state.repGateStep = 'pick'; render(); }
  else if(action === 'create-rep'){
    const name = document.getElementById('rep-name-input').value.trim();
    const pin = document.getElementById('rep-pin-new-input').value.trim();
    const errEl = document.getElementById('rep-new-error');
    if(!name){ errEl.textContent = 'Enter your name.'; return; }
    if(pin.length < 4){ errEl.textContent = 'PIN needs to be at least 4 digits.'; return; }
    if(state.reps.some(r=>r.name.toLowerCase()===name.toLowerCase())){ errEl.textContent = 'That name is already taken — pick another or ask them to switch to it.'; return; }
    const isFirstRepEver = state.reps.length === 0;
    const rep = { id: uid(), name, pin };
    state.reps.push(rep);
    if(isFirstRepEver){
      // Claim any pre-existing data created before multi-rep support existed.
      state.agencies.forEach(a => { if(!a.ownerId) a.ownerId = rep.id; });
      state.routes.forEach(r => { if(!r.ownerId) r.ownerId = rep.id; });
      saveAgencies(); saveRoutes();
    }
    saveReps();
    state.currentRepId = rep.id;
    rememberRepId(rep.id);
    state.repGateStep = 'pick';
    render();
    showToast('Welcome, '+rep.name+'!');
  }
  else if(action === 'set-tab'){ state.tab = btn.dataset.tab; state.editingRouteId = null; render(); }
  else if(action === 'close-modal'){ document.getElementById('modal-root').innerHTML=''; }
  else if(action === 'pick-csv'){ document.getElementById('csv-input').click(); }
  else if(action === 'new-agency'){ openAgencyModal(null); }
  else if(action === 'set-agency-scope'){ state.agencyViewScope = btn.dataset.scope; render(); }
  else if(action === 'edit-agency'){ openAgencyModal(id); }
  else if(action === 'delete-agency'){
    showConfirmModal('Delete this agency? Its visit history will also be removed.', function(){
      state.agencies = state.agencies.filter(a=>a.id!==id);
      state.visits = state.visits.filter(v=>v.agencyId!==id);
      state.routes.forEach(r => { r.stops = r.stops.filter(s=>s.agencyId!==id); });
      saveAgencies(); saveVisits(); saveRoutes();
      document.getElementById('modal-root').innerHTML='';
      render();
      showToast('Agency deleted');
    });
  }
  else if(action === 'save-agency'){
    const name = document.getElementById('f-name').value.trim();
    const address = document.getElementById('f-address').value.trim();
    const principal = document.getElementById('f-principal').value.trim();
    const phone = document.getElementById('f-phone').value.trim();
    const latRaw = document.getElementById('f-lat').value.trim();
    const lonRaw = document.getElementById('f-lon').value.trim();
    if(!name || !address){ showToast('Name and address are required'); return; }
    const lat = latRaw ? parseFloat(latRaw) : null;
    const lon = lonRaw ? parseFloat(lonRaw) : null;
    if((latRaw && isNaN(lat)) || (lonRaw && isNaN(lon))){ showToast('Coordinates must be numbers'); return; }
    if(id){
      const a = agencyById(id);
      const addressChanged = a.address !== address;
      Object.assign(a, {name,address,principal,phone});
      if(lat!=null && lon!=null){ a.lat = lat; a.lon = lon; }
      else if(addressChanged){ delete a.lat; delete a.lon; } // re-geocode next time — old coords no longer match
    } else {
      const agency = {id:uid(), name, address, principal, phone, ownerId: state.currentRepId, createdAt:new Date().toISOString()};
      if(lat!=null && lon!=null){ agency.lat = lat; agency.lon = lon; }
      state.agencies.push(agency);
    }
    saveAgencies();
    document.getElementById('modal-root').innerHTML='';
    render();
    showToast('Agency saved');
  }
  else if(action === 'mark-visited'){ openVisitModal(id); }
  else if(action === 'save-visit'){
    const date = document.getElementById('v-date').value;
    const type = document.getElementById('v-type').value;
    if(!date){ showToast('Pick a date'); return; }
    state.visits.push({id:uid(), agencyId:id, date, type});
    saveVisits();
    document.getElementById('modal-root').innerHTML='';
    render();
    showToast('Visit logged');
  }
  else if(action === 'delete-visit'){
    state.visits = state.visits.filter(v=>v.id!==id);
    saveVisits();
    render();
    const agencyId = btn.dataset.agency;
    if(agencyId) openVisitModal(agencyId);
  }
  else if(action === 'new-route'){
    const r = {id:uid(), name:'New route', day:'Monday', date:'', stops:[], ownerId: state.currentRepId};
    state.routes.push(r);
    saveRoutes();
    state.editingRouteId = r.id;
    render();
  }
  else if(action === 'edit-route'){ state.editingRouteId = id; render(); }
  else if(action === 'close-route-editor'){ state.editingRouteId = null; render(); }
  else if(action === 'duplicate-route'){
    const r = state.routes.find(x=>x.id===id);
    if(r){ state.routes.push({...r, id:uid(), name:r.name+' (copy)', date:'', stops:r.stops.map(s=>({...s}))}); saveRoutes(); render(); showToast('Route duplicated'); }
  }
  else if(action === 'delete-route'){
    showConfirmModal('Delete this route?', function(){
      state.routes = state.routes.filter(r=>r.id!==id);
      saveRoutes();
      document.getElementById('modal-root').innerHTML='';
      render();
      showToast('Route deleted');
    });
  }
  else if(action === 'confirm-yes'){
    const cb = pendingConfirmYes;
    pendingConfirmYes = null;
    if(cb) cb();
  }
  else if(action === 'confirm-no'){
    pendingConfirmYes = null;
    document.getElementById('modal-root').innerHTML='';
  }
  else if(action === 'save-endpoint'){
    const url = document.getElementById('endpoint-input').value.trim();
    if(!url){ showToast('Paste your Apps Script URL first'); return; }
    setEndpoint(url);
    showToast('Connecting…');
    loadState();
  }
  else if(action === 'sync-now'){ syncNow(); }
  else if(action === 'save-route-meta'){
    const r = state.routes.find(x=>x.id===state.editingRouteId);
    r.name = document.getElementById('route-name').value.trim() || 'Untitled route';
    r.day = document.getElementById('route-day').value;
    r.date = document.getElementById('route-date').value;
    saveRoutes(); showToast('Route details saved'); render();
  }
  else if(action === 'toggle-stop'){
    const r = state.routes.find(x=>x.id===state.editingRouteId);
    if(btn.checked) r.stops.push({agencyId:id, time:''}); else r.stops = r.stops.filter(s=>s.agencyId!==id);
    saveRoutes(); render();
  }
  else if(action === 'remove-stop'){
    const r = state.routes.find(x=>x.id===state.editingRouteId);
    r.stops.splice(parseInt(btn.dataset.index,10),1);
    delete state.driveTimeCache[r.id];
    saveRoutes(); render();
  }
  else if(action === 'move-stop-up'){
    const r = state.routes.find(x=>x.id===state.editingRouteId);
    const i = parseInt(btn.dataset.index,10);
    if(i>0){ [r.stops[i-1],r.stops[i]]=[r.stops[i],r.stops[i-1]]; delete state.driveTimeCache[r.id]; saveRoutes(); render(); }
  }
  else if(action === 'move-stop-down'){
    const r = state.routes.find(x=>x.id===state.editingRouteId);
    const i = parseInt(btn.dataset.index,10);
    if(i<r.stops.length-1){ [r.stops[i+1],r.stops[i]]=[r.stops[i],r.stops[i+1]]; delete state.driveTimeCache[r.id]; saveRoutes(); render(); }
  }
  else if(action === 'estimate-drive'){ estimateDriveTimes(id); }
  else if(action === 'toggle-stale-banner'){ state.staleBannerOpen = !state.staleBannerOpen; render(); }
  else if(action === 'save-stale-days'){
    const val = parseInt(document.getElementById('stale-days-input').value, 10);
    state.settings.staleDays = (isFinite(val) && val > 0) ? val : 30;
    saveSettings();
    showToast('Alert threshold saved');
  }
  else if(action === 'save-google-key'){
    const key = document.getElementById('google-key-input').value.trim();
    state.settings.googleMapsApiKey = key;
    saveSettings();
    showToast(key ? 'Google Maps key saved' : 'Google Maps key removed — using free estimates');
  }
  else if(action === 'export-apple'){
    const r = state.routes.find(x=>x.id===id);
    const addresses = r.stops.map(s=>agencyById(s.agencyId)).filter(Boolean).map(a=>a.address);
    if(addresses.length===0){ showToast('Add stops to this route first'); return; }
    window.open(appleMapsUrlMultiStop(addresses), '_blank');
  }
  else if(action === 'export-google'){
    const r = state.routes.find(x=>x.id===id);
    const addresses = r.stops.map(s=>agencyById(s.agencyId)).filter(Boolean).map(a=>a.address);
    if(addresses.length===0){ showToast('Add stops to this route first'); return; }
    window.open(googleMapsUrlMultiStop(addresses), '_blank');
  }
  else if(action === 'copy-stops'){
    const r = state.routes.find(x=>x.id===id);
    const stops = r.stops.map(s=>({ agency: agencyById(s.agencyId), time: s.time })).filter(x=>x.agency);
    const text = stops.map((s,i)=>(i+1)+'. '+s.agency.name+(s.time?' ('+formatTime(s.time)+')':'')+' — '+s.agency.address).join('\\n');
    navigator.clipboard.writeText(text).then(()=>showToast('Stop list copied')).catch(()=>showToast('Could not copy — select and copy manually'));
  }
}

function setupDragReorder(){
  const list = document.getElementById('stop-order-list');
  if(!list) return;
  let dragIndex = null;
  list.querySelectorAll('.stop-item').forEach(item => {
    item.addEventListener('dragstart', () => { dragIndex = parseInt(item.dataset.index,10); item.classList.add('dragging'); });
    item.addEventListener('dragend', () => { item.classList.remove('dragging'); });
    item.addEventListener('dragover', (e) => e.preventDefault());
    item.addEventListener('drop', () => {
      const dropIndex = parseInt(item.dataset.index,10);
      if(dragIndex === null || dragIndex === dropIndex) return;
      const r = state.routes.find(x=>x.id===state.editingRouteId);
      const [moved] = r.stops.splice(dragIndex,1);
      r.stops.splice(dropIndex,0,moved);
      delete state.driveTimeCache[r.id];
      saveRoutes();
      render();
    });
  });
}

loadState();
</script>
